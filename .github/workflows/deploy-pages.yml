name: Deploy dashboard to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build dashboard
        run: npm run build

      - name: Add hosted models from GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/models
          if gh release view models >/dev/null 2>&1; then
            gh release download models --pattern "*.splat" --pattern "*.ksplat" --pattern "*.spz" --dir dist/models --clobber || true
            node .github/scripts/write-model-manifest.mjs dist/models
          else
            echo '{"models":[]}' > dist/models/manifest.json
          fi

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
